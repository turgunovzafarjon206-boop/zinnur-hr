[data-theme="light"]{--bg:#F5F7FA;--surface:#FFFFFF;--surface-2:#F0F3F7;--surface-3:#E6EBF1;--border:#E2E8F0;--border-strong:#CBD5E1;--text:#0F1B2A;--text-2:#475569;--text-3:#8A99AC;--brand:#0E7490;--brand-600:#0891B2;--brand-soft:#E0F2FE;--brand-text:#075985;--success:#15803D;--success-soft:#DCFCE7;--warning:#B45309;--warning-soft:#FEF3C7;--danger:#B91C1C;--danger-soft:#FEE2E2;--info:#1D4ED8;--info-soft:#DBEAFE;--violet:#6D28D9;--violet-soft:#EDE9FE;--shadow:0 1px 2px rgba(15,27,42,.04),0 4px 16px rgba(15,27,42,.06);--shadow-lg:0 10px 40px rgba(15,27,42,.14)}
[data-theme="dark"]{--bg:#0B0F14;--surface:#141A21;--surface-2:#1B232C;--surface-3:#222C37;--border:#243140;--border-strong:#33455A;--text:#EAF1F8;--text-2:#9FB0C3;--text-3:#697D93;--brand:#22D3EE;--brand-600:#06B6D4;--brand-soft:#0E3A47;--brand-text:#7DD3FC;--success:#4ADE80;--success-soft:#103324;--warning:#FBBF24;--warning-soft:#3A2D0A;--danger:#F87171;--danger-soft:#3A1414;--info:#60A5FA;--info-soft:#102641;--violet:#A78BFA;--violet-soft:#241640;--shadow:0 1px 2px rgba(0,0,0,.4),0 4px 18px rgba(0,0,0,.45);--shadow-lg:0 14px 50px rgba(0,0,0,.6)}
*{box-sizing:border-box}
body{margin:0}
.hr-root{font-family:var(--font-ui);color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
.hr-root button{font-family:inherit;cursor:pointer}
.mono-num{font-family:var(--font-display);font-variant-numeric:tabular-nums}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:256px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;transition:transform .25s}
.main{flex:1;margin-left:256px;min-width:0;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:30}
.content{padding:26px 28px;flex:1;max-width:1560px;width:100%;margin:0 auto}
.brand{display:flex;align-items:center;gap:11px;padding:18px 18px 14px}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-600));display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:17px;flex:none}
.brand-name{font-family:var(--font-display);font-weight:700;font-size:16.5px;letter-spacing:-.2px}
.brand-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.nav{flex:1;overflow-y:auto;padding:6px 12px 18px}
.nav-group{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border-radius:9px;border:none;background:transparent;color:var(--text-2);font-size:13.5px;font-weight:500;text-align:left;position:relative;transition:.12s}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-text);font-weight:600}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brand)}
.nav-item .badge-dot{margin-left:auto;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
.icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--text-2);transition:.12s;position:relative}
.icon-btn:hover{background:var(--surface-2);color:var(--text);border-color:var(--border-strong)}
.search-top{flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text-3)}
.search-top input{border:none;background:none;outline:none;color:var(--text);font-size:13.5px;width:100%}
.page-title{font-family:var(--font-display);font-weight:600;font-size:15px}
.user-chip{display:flex;align-items:center;gap:9px;padding:5px 9px 5px 5px;border-radius:10px;border:1px solid var(--border);background:var(--surface)}
.user-chip:hover{background:var(--surface-2)}
.avatar{width:30px;height:30px;border-radius:8px;background:var(--brand-soft);color:var(--brand-text);display:grid;place-items:center;font-weight:700;font-size:12.5px;flex:none;font-family:var(--font-display)}
.avatar.lg{width:64px;height:64px;border-radius:14px;font-size:24px}
.dropdown{position:absolute;right:0;top:46px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);min-width:230px;padding:6px;z-index:60}
.dd-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:8px;border:none;background:transparent;color:var(--text);font-size:13px;text-align:left}
.dd-item:hover{background:var(--surface-2)}
.dd-sep{height:1px;background:var(--border);margin:5px 0}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-family:var(--font-display);font-size:23px;font-weight:600;letter-spacing:-.5px;margin:0}
.page-head p{color:var(--text-2);font-size:13.5px;margin:4px 0 0}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.12s;white-space:nowrap}
.btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-600);border-color:var(--brand-600)}
.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text-2)}
.btn.ghost:hover{background:var(--surface-2);color:var(--text)}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.block{width:100%;justify-content:center;padding:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}
.card-pad{padding:18px}
.card-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-head h3{font-family:var(--font-display);font-size:14.5px;font-weight:600;margin:0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 17px;box-shadow:var(--shadow)}
.stat-top{display:flex;align-items:center;justify-content:space-between}
.stat-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.stat-label{color:var(--text-2);font-size:12.5px;font-weight:500;margin-top:13px}
.stat-val{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-.5px;margin-top:2px;line-height:1.1}
.stat-trend{font-size:11.5px;font-weight:600;margin-top:7px;display:inline-flex;align-items:center;gap:4px}
.up{color:var(--success)}.down{color:var(--danger)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-23{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
@media(max-width:1080px){.grid-2,.grid-3,.grid-23{grid-template-columns:1fr}}
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:11px 14px;color:var(--text-2);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface-2)}
.tbl th.sortable{cursor:pointer;user-select:none}
.tbl th.sortable:hover{color:var(--text)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl tfoot td{padding:11px 14px;border-top:2px solid var(--border-strong);font-weight:700;background:var(--surface-2)}
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.act{width:30px;height:30px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--text-3);display:grid;place-items:center;transition:.12s}
.act:hover{background:var(--surface-3);color:var(--text)}
.act.del:hover{background:var(--danger-soft);color:var(--danger)}
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-in{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text-3);min-width:200px;flex:1;max-width:300px}
.search-in input{border:none;background:none;outline:none;color:var(--text);font-size:13px;width:100%}
.select{padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13px;outline:none}
.select:focus{border-color:var(--brand)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.b-success{background:var(--success-soft);color:var(--success)}
.b-warning{background:var(--warning-soft);color:var(--warning)}
.b-danger{background:var(--danger-soft);color:var(--danger)}
.b-info{background:var(--info-soft);color:var(--info)}
.b-violet{background:var(--violet-soft);color:var(--violet)}
.b-muted{background:var(--surface-3);color:var(--text-2)}
.b-brand{background:var(--brand-soft);color:var(--brand-text)}
.pager{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.pager .info{color:var(--text-2);font-size:12.5px}
.pg-btns{display:flex;gap:6px;align-items:center}
.pg{min-width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-size:12.5px;font-weight:600}
.pg:hover:not(:disabled){background:var(--surface-2);color:var(--text)}
.pg.cur{background:var(--brand);border-color:var(--brand);color:#fff}
.pg:disabled{opacity:.4;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(8,12,18,.55);backdrop-filter:blur(3px);z-index:80;display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:560px}
.modal.wide{max-width:780px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-family:var(--font-display);font-size:16.5px;font-weight:600;margin:0}
.modal-body{padding:20px;max-height:64vh;overflow-y:auto}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:12.5px;font-weight:600;color:var(--text-2)}
.field label .req{color:var(--danger)}
.input,.field textarea,.field select{padding:9px 11px;border-radius:9px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:13.5px;outline:none;font-family:inherit;width:100%}
.input:focus,.field textarea:focus,.field select:focus{border-color:var(--brand);background:var(--surface)}
.field textarea{resize:vertical;min-height:74px}
.field .err{color:var(--danger);font-size:11.5px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:100;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:11px;padding:12px 15px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;min-width:240px}
.toast.ok{border-left-color:var(--success)}.toast.err{border-left-color:var(--danger)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
.detail-grid .lbl{font-size:11.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.detail-grid .val{font-size:14px;margin-top:2px}
.kanban{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px}
.kcol{min-width:248px;flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:13px;padding:10px}
.kcol-head{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 10px;font-weight:600;font-size:13px}
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow)}
.mini-list{display:flex;flex-direction:column}
.mini-row{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.mini-row:last-child{border-bottom:none}
.mini-row .t{font-size:13.5px;font-weight:500}
.mini-row .s{font-size:12px;color:var(--text-2)}
.empty{text-align:center;padding:46px 20px;color:var(--text-3)}
.empty svg{margin-bottom:10px;opacity:.6}
.pbar{height:7px;border-radius:6px;background:var(--surface-3);overflow:hidden}
.pbar>i{display:block;height:100%;border-radius:6px;background:var(--brand)}
.toggle-pill{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px;flex-wrap:wrap}
.toggle-pill button{border:none;background:transparent;padding:6px 13px;border-radius:7px;font-size:12.5px;font-weight:600;color:var(--text-2)}
.toggle-pill button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.funnel{display:flex;flex-direction:column;gap:10px}
.funnel-row{display:flex;align-items:center;gap:12px}
.funnel-row .fl{width:130px;font-size:12.5px;color:var(--text-2);font-weight:500;flex:none}
.funnel-bar{flex:1;height:30px;border-radius:8px;background:var(--surface-2);overflow:hidden;position:relative}
.funnel-bar>i{display:block;height:100%;border-radius:8px;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:12.5px;font-weight:700;font-family:var(--font-display)}
.access-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:560px){.access-grid{grid-template-columns:1fr 1fr}}
.chk{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:9px;background:var(--surface-2);font-size:12.5px;cursor:pointer;color:var(--text-2)}
.chk.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-text)}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-chk{background:none;border:none;color:var(--text-3);display:grid;place-items:center;padding:0}
.task-chk.done{color:var(--success)}
.task-txt.done{text-decoration:line-through;color:var(--text-3)}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(1200px 600px at 80% -10%,var(--brand-soft),transparent),var(--bg)}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-lg);padding:30px}
.demo-acc{display:flex;justify-content:space-between;gap:8px;padding:7px 11px;border:1px dashed var(--border);border-radius:9px;font-size:12px;margin-bottom:7px;cursor:pointer;background:var(--surface-2)}
.demo-acc:hover{border-color:var(--brand)}
.menu-btn{display:none}.overlay-mob{display:none}
.numcell{width:74px;text-align:center;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-family:var(--font-display);font-variant-numeric:tabular-nums}
.numcell:focus{border-color:var(--brand);background:var(--surface);outline:none}
@media(max-width:980px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}.main{margin-left:0}.menu-btn{display:grid}.search-top{display:none}.sidebar.open ~ .overlay-mob{display:block;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35}.stat-grid{grid-template-columns:1fr 1fr}.content{padding:16px}}
